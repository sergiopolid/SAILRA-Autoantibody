# Render.com blueprint for InfinityBio Streamlit dashboard
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: infinitybio-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    # Add CSV URLs or paths via Render Environment tab, e.g.:
    # HUSIGHT_FULL_LENGTH_IGG_CSV_URL, VIRSIGHT_IGG_CSV_URL, etc.
